name: Build and release SpikeSim desktop app

# Cut a release by pushing a tag like v1.1.0:
#   git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for softprops/action-gh-release to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop app (Electron NSIS installer + portable)
        run: npm run build:app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpikeSim-desktop
          path: dist/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Ships the Electron installer + portable exe:
          #   "SpikeSim Setup X.Y.Z.exe"  (NSIS installer — primary artifact)
          #   "SpikeSim X.Y.Z.exe"        (portable, no install)
          files: dist/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
