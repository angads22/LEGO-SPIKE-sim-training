name: Build and release SpikeSim desktop app

# Cut a release either way:
#   - push a tag like v1.2.0:   git tag v1.2.0 && git push origin v1.2.0
#   - or run this workflow from the Actions tab (workflow_dispatch) with the
#     tag input (e.g. v1.2.0) — the release step then creates that tag at the
#     built commit.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.0)'
        required: true
        default: 'v1.2.0'

permissions:
  contents: write   # needed for softprops/action-gh-release to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop app (Electron NSIS installer + portable)
        run: npm run build:app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpikeSim-desktop
          path: dist/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # On a tag push this is the pushed tag; on workflow_dispatch the tag
          # from the input is created at the built commit.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          # Ships the Electron installer + portable exe:
          #   "SpikeSim Setup X.Y.Z.exe"  (NSIS installer — primary artifact)
          #   "SpikeSim X.Y.Z.exe"        (portable, no install)
          files: dist/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
